{% extends "hospital/admin_base.html" %}
{% block content %}
{%load static%}

<div class="container">
  <div class="panel panel-primary">
    <div class="panel-heading">
      <h2 class="panel-title">Add New Room</h2>
    </div>
    <div class="panel-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="room_number">Room Number</label>
          <input type="text" class="form-control" id="room_number" name="room_number" required>
        </div>
        <div class="form-group">
          <label for="room_type">Room Type</label>
          <select class="form-control" id="room_type" name="room_type" required>
            <option value="General">General Ward</option>
            <option value="Private">Private Room</option>
            <option value="ICU">Intensive Care Unit</option>
            <option value="CCU">Cardiac Care Unit</option>
            <option value="Pediatric">Pediatric Ward</option>
          </select>
        </div>
        <div class="form-group">
          <label for="capacity">Capacity</label>
          <input type="number" class="form-control" id="capacity" name="capacity" min="1" value="1" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Room</button>
        <a href="{% url 'admin-rooms' %}" class="btn btn-default">Cancel</a>
      </form>
    </div>
  </div>
</div>

{% endblock content %}
